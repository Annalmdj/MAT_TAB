<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MAT_TAB</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

/* 🌈 BACKGROUND */
body {
    height: 100vh;
    background: linear-gradient(135deg, #141e30, #243b55);
    overflow: hidden;
    color: white;
}

/* 🔢 DJ MATH SYMBOLS */
.math-bg span {
    position: absolute;
    font-size: 22px;
    font-weight: bold;
    animation: floatMath 10s linear infinite;
}

.math-bg span:nth-child(1){ color:#ff4d6d; }
.math-bg span:nth-child(2){ color:#00f2fe; }
.math-bg span:nth-child(3){ color:#00ff88; }
.math-bg span:nth-child(4){ color:#ffcc00; }
.math-bg span:nth-child(5){ color:#cc00ff; }

@keyframes floatMath {
    0% { transform: translateY(100vh); opacity:0; }
    50% { opacity:1; }
    100% { transform: translateY(-10vh); opacity:0; }
}

/* 🧑 PROFILE BUTTON */
.profile-btn {
    position: absolute;
    top: 20px;
    right: 30px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    background: url('https://i.pravatar.cc/100') center/cover;
    cursor: pointer;
    border: 2px solid white;
}

/* 📦 PROFILE CARD */
.profile-card {
    position: absolute;
    top: 70px;
    right: 30px;
    width: 250px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    text-align: center;
    display: none;
}

.profile-card img {
    width: 70px;
    border-radius: 50%;
}

.profile-card h3 {
    margin-top: 10px;
}

.profile-card p {
    font-size: 12px;
    opacity: 0.7;
}

/* 🎯 CENTER BOX */
.center-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    position: relative;
    overflow: hidden;
}

/* ✨ DOUBLE SHINE */
.center-box::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 60%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.4), transparent);
    transform: rotate(25deg);
    top: -120%;
    left: -50%;
    animation: shine1 5s infinite;
}

.center-box::after {
    content: "";
    position: absolute;
    width: 200%;
    height: 60%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.5), transparent);
    transform: rotate(-25deg);
    bottom: -120%;
    left: -50%;
    animation: shine2 6s infinite;
}

@keyframes shine1 {
    0% { top: -120%; }
    100% { top: 200%; }
}

@keyframes shine2 {
    0% { bottom: -120%; }
    100% { bottom: 200%; }
}

/* TITLE */
.center-box h1 {
    margin-bottom: 20px;
}

/* INPUT */
.center-box input {
    width: 300px;
    padding: 12px;
    border-radius: 25px;
    border: none;
    outline: none;
}

/* 🔘 BUTTON */
.center-box button {
    position: relative;
    overflow: hidden;
    margin-top: 15px;
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(90deg,#ff4d6d,#4facfe);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

/* ⚡ FLASH */
.center-box button::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(255,255,255,0.6), transparent);
    opacity: 0;
    top: 0;
    left: 0;
    transition: 0.3s;
}

.center-box button:hover::after {
    opacity: 0.4;
}

.center-box button:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<!-- 🔢 SYMBOLS -->
<div class="math-bg">
    <span style="left:10%;">+</span>
    <span style="left:30%;">×</span>
    <span style="left:50%;">π</span>
    <span style="left:70%;">√</span>
    <span style="left:90%;">∞</span>
</div>

<!-- 🧑 PROFILE -->
<div class="profile-btn" onclick="toggleProfile()"></div>

<div class="profile-card" id="profileCard">
    <img src="https://i.pravatar.cc/100">
    <h3>Annal</h3>
    <p>annalmdj2309@gmail.com</p>
</div>

<!-- 🎯 CENTER -->
<div class="center-box">
    <h1>Welcome to MAT_TAB 🎉</h1>
    <input type="text" placeholder="Enter your question...">
    <br>
    <button>Search</button>
</div>

<script>
function toggleProfile() {
    let card = document.getElementById("profileCard");
    card.style.display = card.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
